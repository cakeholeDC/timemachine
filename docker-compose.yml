services:
  timemachine:
    container_name: timemachine
    image: 'mbentley/timemachine:smb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/timemachine/.drive-mounted"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    network_mode: host
    environment:
      - PASSWORD=${TM_PASSWORD:-timemachine}
      - SHARE_NAME=${TM_SHARENAME:-TimeMachine}
      - SMB_NFS_ACES=yes
      - SMB_VFS_OBJECTS=acl_xattr fruit streams_xattr
      - VOLUME_SIZE_LIMIT=${TM_VOLUME_SIZE_LIMIT}
    volumes:
      - '${TM_DEVICE_MOUNT_POINT}:/opt/timemachine'
      - 'var-lib-samba:/var/lib/samba'
      - 'var-cache-samba:/var/cache/samba'
      - 'run-samba:/run/samba'

volumes:
  var-lib-samba:
  var-cache-samba:
  run-samba:
